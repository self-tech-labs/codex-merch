name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: codex_merch_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/codex_merch_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/codex_merch_test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      - run: npm run merch:validate
      - run: npm test
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: npm run submission:verify:repository
